<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body id="app-body">
    <div class="app-container">
        <!-- Sidemenu -->
        <aside class="sidemenu">
            <div class="sidemenu-header">
                <h2>🤖 Shogun</h2>
            </div>
            
            <!-- Toggle de Tema (Claro/Escuro) -->
            <div class="theme-toggle-container">
                <button id="theme-toggle" class="theme-btn" aria-label="Alternar tema claro/escuro" title="Alternar Tema">
                    <!-- Ícone Sol (Claro) -->
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Ícone Lua (Escuro) -->
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            
            <nav class="sidemenu-nav">
                <button class="sidemenu-btn active" data-panel="chat" aria-label="Ir para Chat">
                    <span class="icon">💬</span>
                    <span class="label">Chat</span>
                </button>
                <button class="sidemenu-btn" data-panel="config" aria-label="Ir para Cérebro">
                    <span class="icon">🧠</span>
                    <span class="label">Cérebro</span>
                </button>
            </nav>
            <div class="sidemenu-footer">
                <p>v1.0.0</p>
            </div>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Painel Chat -->
            <section id="chat-panel" class="panel active" role="tabpanel" aria-labelledby="chat-tab">
                <div class="panel-header">
                    <h1>💬 Chat</h1>
                </div>
                <!-- Wrapper para mensagens com scroll -->
                <div class="chat-wrapper">
                    <div id="chat-box" class="chat-box" aria-live="polite">
                        <!-- Mensagens serão inseridas aqui -->
                    </div>
                </div>
                <!-- Indicador de processamento (fica dentro do wrapper para scroll) -->
                <div id="processing-indicator" class="processing-indicator hidden">
                    Processando...
                </div>
                <!-- Área de input fixa no rodapé -->
                <div class="input-area">
                    <input 
                        type="text" 
                        id="user-input" 
                        placeholder="Digite sua mensagem..." 
                        aria-label="Campo de mensagem"
                        autocomplete="off"
                    >
                    <button id="send-btn" type="button" aria-label="Enviar mensagem">Enviar</button>
                </div>
            </section>

            <!-- Painel Configurações -->
            <section id="config-panel" class="panel" role="tabpanel" aria-labelledby="config-tab">
                <div class="panel-header">
                    <h1>🧠 Cérebro</h1>
                </div>
                <form id="config-form" class="config-form">
                    <fieldset class="config-groupbox">
                        <legend>LLM Principal</legend>
                    
                    <div class="form-group">
                        <label for="base-url">Provedor/Base URL</label>
                        <input 
                            type="url" 
                            id="base-url" 
                            name="base_url" 
                            placeholder="http://localhost:1234/v1"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="api-key">API Key</label>
                        <input 
                            type="password" 
                            id="api-key" 
                            name="api_key" 
                            placeholder="Sua chave de API"
                        >
                    </div>

                    <div class="form-group">
                        <label for="model">Modelo</label>
                        <input 
                            type="text" 
                            id="model" 
                            name="model" 
                            placeholder="nome-do-modelo"
                        >
                    </div>

                    <div class="form-group">
                        <label for="temperature">Temperatura: <span id="temp-value">0.7</span></label>
                        <input 
                            type="range" 
                            id="temperature" 
                            name="temperature" 
                            min="0.0" 
                            max="1.0" 
                            step="0.1" 
                            value="0.7"
                        >
                    </div>
                    </fieldset>

                    <button type="submit" id="save-config-btn">Salvar Configurações</button>
                </form>
                <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
            </section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
